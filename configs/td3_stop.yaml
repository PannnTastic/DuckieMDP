algorithm: td3
stage: stop
seed: 73

environment:
  map_name: small_loop
  domain_rand: false
  # 9000 physics ticks / 30 Hz = 300 s; frame_skip 6 -> 1500 decision per episode,
  # sama dengan horizon SAC full_repeat_duck_5min.
  max_steps: 9000
  frame_skip: 6
  render_observations: false
  accept_start_angle_deg: 10
  spawn_max_abs_d: 0.08
  spawn_max_abs_phi: 0.175
  spawn_attempts: 100
  spawn_route_direction: clockwise
  spawn_route_center: null
  spawn_min_route_alignment: 0.50
  spawn_position_bounds_xz: [0.10, 0.45, 0.45, 1.30]
  user_tile_start: [0, 1]
  goal_tile: null

state:
  stop_lateral_limit: 0.40
  stop_orientation_cos: 0.70710678
  sign_to_line_offset: 0.20
  stop_max_distance: 3.0
  stop_zone: 0.45
  stop_pass_distance: 0.55
  stop_speed: 0.02
  stop_hold_steps: 3
  tile_lookahead: 0.30
  curvature_threshold: 0.05
  duck_max_distance: 1.20
  duck_near_distance: 0.60
  duck_corridor_width: 0.60

continuous_state:
  max_speed: 0.41
  max_abs_curvature: 8.0
  max_stop_distance: 3.0
  max_duck_distance: 2.0
  max_relative_speed: 0.50
  curvature_samples: 33
  # Gerbang deteksi Duckie: paritas informasi dengan classify_duck tabular
  # (teacher Q/SARSA memakai duck_max_distance 1.20 dan corridor 0.60).
  # SAC lama dilatih TANPA gerbang ini sehingga melihat Duckie di 100% state;
  # TD3 hanya menerima Duckie di koridor depan dalam rentang 1.20 m.
  duck_detection_range: 1.20
  duck_detection_corridor_width: 0.60
  duck_detection_forward_only: true

actions:
  v_fast: 0.41
  v_slow: 0.17
  w0: 1.50
  wheel_base: 0.102

duck_controller:
  # Stop-stage curriculum: remove pedestrians so the policy focuses purely on
  # discovering the full-stop dwell, then re-introduce ducks in the full task.
  p_cross: 0.0
  make_dynamic: true
  require_duck: false
  inject_if_missing: false
  spawn_pos: [1.62, 0.50]
  spawn_rotate: 0.0
  spawn_height: 0.08
  walk_distance: 0.90
  trigger_min_ego_distance: 0.35
  trigger_max_ego_distance: 0.45
  max_crossings_per_episode: 0
  inject_stop_if_missing: true
  require_stop: true
  stop_spawn_pos: [1.20, 2.10]
  stop_spawn_rotate: 180.0
  stop_spawn_height: 0.18

reward:
  alpha_progress: 1.0
  alpha_lateral: 2.0
  alpha_heading: 0.5
  step_cost: 0.01
  collision_duck: -200.0
  other_collision: -200.0
  offroad: -200.0
  stop_violation: -80.0
  full_stop: 40.0
  duck_yield: 0.0
  duck_unsafe: -5.0
  duck_yield_speed: 0.04
  unnecessary_stop: -2.0
  idle_speed: 0.04
  stop_exemption_distance: 0.45
  # Dense stop-approach shaping (TD3 only). Mirrors the pedestrian-yield term so
  # the deterministic actor gets a per-step gradient toward slowing at the sign:
  # carrying speed within 0.60 m of an unsatisfied stop is penalised, and being
  # at the full-stop speed earns a small credit. Breaks the exploration deadlock
  # where the sparse full_stop event was never discovered.
  stop_approach_distance: 0.60
  stop_approach_speed: 0.02
  stop_approach_yield: 1.0
  stop_approach_unsafe: -5.0
  straight_steer_penalty: 0.5
  straight_curvature_threshold: 0.05
  max_steer_command: 1.5
  goal: 50.0

td3:
  gamma: 0.99
  tau: 0.005
  actor_lr: 0.0003
  critic_lr: 0.0003
  batch_size: 256
  replay_capacity: 300000
  hidden_size: 256
  exploration_noise: 0.10
  target_policy_noise: 0.20
  target_noise_clip: 0.50
  policy_delay: 2
  # Critic warm-up: freeze the loaded 55k driver for 5000 critic updates so the
  # critic re-fits the sharpened stop reward before the actor is nudged. Without
  # this the stale critic destabilises the actor and the good driver goes offroad.
  actor_update_start: 5000

training:
  # Stop curriculum, mirroring the SAC stop stage: warm-start from the gated
  # driver, isolate the stop task, and train long with an exploration burst so
  # the Gaussian-noise actor can discover the dwell. random_steps seeds the
  # replay with diverse (including low-speed) transitions; the critic warm-up
  # then re-fits before the actor is nudged toward stopping.
  total_steps: 120000
  random_steps: 3000
  gradient_steps: 1
  checkpoint_interval: 10000
  log_interval: 500
  output_dir: runs/td3_stop_curriculum
  initial_checkpoint: runs/td3_full_gated_duck_120k/checkpoints/td3_step_000055000.pt
  device: cuda

evaluation:
  development_episodes: 10
  final_episodes: 30
  development_seeds: [2101, 2202, 2303, 2404, 2505]
  final_seeds: [20101, 20202, 20303, 20404, 20505]
  # Relaxed like the SAC stop stage: this stage rewards competent stopping, not
  # long-distance progress (the full task re-imposes the 18 m bar).
  success_min_progress_m: 5.0
  success_max_brake_ratio: 0.25
  brake_command_threshold: 0.04
  move_command_threshold: 0.10
  spin_omega_threshold: 0.75
  resume_window_steps: 20

wandb:
  enabled: true
  entity: naimackerman-its
  project: DuckieMDP
  name: td3-stop-curriculum-seed73
  group: td3-continuous
  job_type: curriculum
  mode: online
  tags: [td3, stop-stage, curriculum, gated-duck-detection, teacher-free, 120k]
  notes: TD3 stop-stage curriculum (SAC-style). Warm-start from the 55k gated driver, remove pedestrians to isolate the stop task, force a stop sign every episode, and train long with a 3k random exploration burst plus critic warm-up so the deterministic actor can discover the full-stop dwell.
  log_checkpoints: true
