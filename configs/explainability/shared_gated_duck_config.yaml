algorithm: sac
stage: full
seed: 73
environment:
  map_name: small_loop
  domain_rand: false
  max_steps: 1500
  frame_skip: 6
  render_observations: false
  accept_start_angle_deg: 10
  spawn_max_abs_d: 0.08
  spawn_max_abs_phi: 0.175
  spawn_attempts: 100
  spawn_route_direction: clockwise
  spawn_route_center: null
  spawn_min_route_alignment: 0.5
  spawn_position_bounds_xz:
  - 0.1
  - 0.45
  - 0.45
  - 1.3
  user_tile_start:
  - 0
  - 1
  goal_tile: null
state:
  stop_lateral_limit: 0.4
  stop_orientation_cos: 0.70710678
  sign_to_line_offset: 0.2
  stop_max_distance: 3.0
  stop_zone: 0.45
  stop_pass_distance: 0.55
  stop_speed: 0.02
  stop_hold_steps: 3
  tile_lookahead: 0.3
  curvature_threshold: 0.05
  duck_max_distance: 1.2
  duck_near_distance: 0.6
  duck_corridor_width: 0.6
continuous_state:
  max_speed: 0.41
  max_abs_curvature: 8.0
  max_stop_distance: 3.0
  max_duck_distance: 2.0
  max_relative_speed: 0.5
  curvature_samples: 33
  # Duck-detection gate so continuous policies trained under gating (TD3,
  # SAC-gated) see the same restricted Duckie observation at explanation time.
  duck_detection_range: 1.20
  duck_detection_corridor_width: 0.60
  duck_detection_forward_only: true
actions:
  v_fast: 0.41
  v_slow: 0.17
  w0: 1.5
  wheel_base: 0.102
duck_controller:
  p_cross: 1.0
  make_dynamic: true
  require_duck: true
  inject_if_missing: true
  spawn_pos:
  - 1.62
  - 0.5
  spawn_rotate: 0.0
  spawn_height: 0.08
  walk_distance: 0.9
  trigger_min_ego_distance: 0.35
  trigger_max_ego_distance: 0.45
  max_crossings_per_episode: 1
  inject_stop_if_missing: true
  require_stop: true
  stop_spawn_pos:
  - 1.2
  - 2.1
  stop_spawn_rotate: 180.0
  stop_spawn_height: 0.18
reward:
  alpha_progress: 1.0
  alpha_lateral: 2.0
  alpha_heading: 0.5
  step_cost: 0.01
  collision_duck: -200.0
  other_collision: -200.0
  offroad: -200.0
  stop_violation: -40.0
  full_stop: 15.0
  duck_yield: 0.0
  duck_unsafe: -5.0
  duck_yield_speed: 0.04
  unnecessary_stop: -2.0
  idle_speed: 0.04
  stop_exemption_distance: 0.45
  straight_steer_penalty: 0.0
  straight_curvature_threshold: 0.05
  max_steer_command: 1.5
  goal: 50.0
sac:
  gamma: 0.99
  tau: 0.005
  actor_lr: 0.0003
  critic_lr: 0.0003
  alpha_lr: 0.0003
  initial_alpha: 0.2
  batch_size: 256
  replay_capacity: 300000
  hidden_size: 256
  target_entropy: -2.0
training:
  total_steps: 20000
  random_steps: 0
  gradient_steps: 1
  checkpoint_interval: 5000
  log_interval: 1000
  output_dir: runs/sac_full_long_horizon_5min_warmstart_20k_wandb
  initial_checkpoint: runs/sac_full_dwell3_steer_warmstart_20k_wandb/sac_best.pt
  save_initial_checkpoint: true
  device: cuda
evaluation:
  development_episodes: 10
  final_episodes: 30
  development_seeds:
  - 2101
  - 2202
  - 2303
  - 2404
  - 2505
  final_seeds:
  - 20101
  - 20202
  - 20303
  - 20404
  - 20505
  success_min_progress_m: 18.0
  success_max_brake_ratio: 0.25
  brake_command_threshold: 0.04
  move_command_threshold: 0.1
  spin_omega_threshold: 0.75
  resume_window_steps: 20
wandb:
  enabled: true
  entity: naimackerman-its
  project: DuckieMDP
  name: sac-full-long-horizon-5min-warmstart-20k-seed73
  group: sac-continuous-long-horizon
  job_type: fine-tune
  mode: online
  tags:
  - sac
  - full-task
  - long-horizon
  - five-minute
  - warm-start
  - recovery
  - teacher-free
  - 20k
  notes: Warm-start from the safe dwell3/straight-steer checkpoint. Extends each episode
    from 1500 to 9000 physics ticks so post-decision-250 drift and off-road recovery
    enter the replay buffer.
  log_checkpoints: true
