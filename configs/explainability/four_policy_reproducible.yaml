experiment:
  name: explanation_derived_primitives_four_policy_reproduction
  output_dir: runs/explanations/four_policy_reproduction
  shared_environment_config: configs/explainability/shared_gated_duck_config.yaml
  m2_lexicon: docs/primitive_lexicon_v1.freeze.json

# These are the exact frozen policies used by the four-policy explanation run.
# Teacher guidance was allowed during tabular training, but every explanation
# uses the learned policy alone.
policies:
  q_learning:
    checkpoint: artifacts/ablation/full_task/q_learning_teacher/q_table_best.npy
    training_config: configs/small_loop_stop_duck_q.yaml
    evaluation_mode: greedy_teacher_free
  sarsa:
    checkpoint: artifacts/ablation/full_task/sarsa_teacher/q_table_best.npy
    training_config: configs/small_loop_stop_duck_sarsa.yaml
    evaluation_mode: greedy_teacher_free
  sac:
    checkpoint: artifacts/policies/sac_gated_duck/sac_final.pt
    training_config: artifacts/policies/sac_gated_duck/config.yaml
    evaluation_mode: deterministic_actor_mean
  td3:
    checkpoint: artifacts/policies/td3_gated_duck/td3_final.pt
    training_config: artifacts/policies/td3_gated_duck/config.yaml
    evaluation_mode: deterministic_actor_mean

# Frozen accepted M1--M13 summaries are provenance inputs. The per-decision
# three-pillar explanation is recomputed by run_cedp_collect.py.
explanation_artifacts:
  m6_response_curves: artifacts/explainability/four_policy/m1_m13_summaries/m6_summary.json
  m7_metamorphic: artifacts/explainability/four_policy/m1_m13_summaries/m7_summary.json
  m8_exact_q: artifacts/explainability/four_policy/m1_m13_summaries/m8_summary.json
  m9_sac_internal: artifacts/explainability/four_policy/m1_m13_summaries/m9_summary.json
  m10_rules: artifacts/explainability/four_policy/m1_m13_summaries/m10_summary.json
  m11_bottom_up: artifacts/explainability/four_policy/m1_m13_summaries/m11_summary.json
  m12_unified: artifacts/explainability/four_policy/m1_m13_summaries/unified_explanation_report.json
  m13_sarsa: artifacts/explainability/four_policy/m1_m13_summaries/m13_sarsa_explanation_report.json

baselines_not_main_input:
  eddp_v1_acceptance: docs/eddp_v1_acceptance.json
  eddp_v1_results: docs/explanation_derived_driving_primitives_results.md

collection:
  seeds: [20101, 20202, 20303, 20404, 20505]
  episodes_per_seed: 1
  episode_seed_stride: 100000
  max_decisions: 200
  # Legacy key name retained for schema compatibility. In the descriptive
  # pipeline this means valid explanation instances, not primitive certificates.
  minimum_certified_instances_per_solver: 1000

counterfactual:
  max_horizon: 15
  fixed_horizons: [1, 5, 10, 15]
  event_horizon: false

verification_support:
  tabular_evaluation_count_threshold: 3
  continuous_knn_quantile: 0.95
  continuous_radius_multiplier: 1.25
  continuous_minimum_group_size: 3

segmentation:
  development_seed_count: 3
  distance_quantile: 0.85
  minimum_duration: 3
  primary: change_point
  fixed_window_baselines: [3, 5]

discovery:
  development_seed_count: 3
  radius_multiplier: 1.25
  pca_components: 20

# These gates are retained as an optional audit. The main paper-facing result
# is the descriptive four-family mapping with Why, What-if, Verification, and
# Temporal evidence; it does not claim that every discovered cluster passes.
certification:
  minimum_support: 12
  minimum_seeds: 3
  minimum_bootstrap_ari: 0.70
  maximum_outcome_coherence_ratio: 0.80
  minimum_property_evidence: 1
  require_full_trajectory: true
  require_all_member_certificates: true

ablation:
  include_legacy_sparse_baseline: false
  include_fixed_windows: true
  include_decision_only: true
  include_without_verification: true
  include_without_temporal: true
